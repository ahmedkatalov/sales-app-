services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-openai/gpt-4.1-mini}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - SUPER_ADMIN_TOKEN=${SUPER_ADMIN_TOKEN}
    volumes:
      - ./backend/data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "8081:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend